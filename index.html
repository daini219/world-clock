<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Business Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="clock-widget">
    <header>
      <div>
        <h1>🌎 Global Business Clock</h1>
        <p>Americas / Korea real-time dashboard</p>
      </div>
      <div class="legend">
        <span><b class="dot open"></b>업무시간</span>
        <span><b class="dot soon"></b>근접</span>
        <span><b class="dot closed"></b>비업무</span>
      </div>
    </header>

    <section id="clock-list" class="clock-list"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
